<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-label="OpenWish">
  <!--
    OpenWish brand mark — a four-pointed sparkle (the universal "wish on a
    star" / "make a wish" glyph), drawn as a single-shape silhouette so it
    stays legible at favicon scale and inherits currentColor like an SF
    Symbol. Pairs well with a small companion dot for personality.
  -->
  <path d="M12 1.5
           C 12.5 6.4, 13.6 8.0, 15.5 8.6
           L 22.5 12
           L 15.5 15.4
           C 13.6 16.0, 12.5 17.6, 12 22.5
           C 11.5 17.6, 10.4 16.0, 8.5 15.4
           L 1.5 12
           L 8.5 8.6
           C 10.4 8.0, 11.5 6.4, 12 1.5 Z" />
  <circle cx="20" cy="4" r="1.5" />
</svg>
